spring:
  application:
    name: styleflow

  datasource:
    url: jdbc:postgresql://localhost:5432/styleflow
    username: styleflow_user
    password: styleflow_pass

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    ignored: /api/auth/**

server:
  port: 8080

jwt:
  secret: your-secret-key-change-in-production
  expiration: 86400000