version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: styleflow-db
    environment:
      POSTGRES_DB: styleflow
      POSTGRES_USER: styleflow_user
      POSTGRES_PASSWORD: styleflow_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U styleflow_user -d styleflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: styleflow-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/styleflow
      SPRING_DATASOURCE_USERNAME: styleflow_user
      SPRING_DATASOURCE_PASSWORD: styleflow_pass
      JWT_SECRET: change-me-in-production
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: styleflow-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
